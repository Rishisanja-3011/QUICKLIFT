<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickLift - Ride Sharing Platform</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            padding-top: 60px; /* Offset for navbar */
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(15,23,42,0.8), rgba(15,23,42,0.95)), 
                        url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') center/cover;
            z-index: -1;
        }

        .hero-content {
            max-width: 800px;
            padding: 0 20px;
            animation: fadeInUp 1s ease-out;
        }

        .hero-title {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ffffff, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .hero-subtitle {
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: var(--color-text-secondary);
            margin-bottom: 40px;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-buttons .btn {
            padding: 16px 40px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="{{ url_for('index') }}" class="logo">
                <i class="fa-solid fa-route" style="color: var(--color-primary)"></i> Quick<span>Lift</span>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('login') }}" class="nav-item">Login</a>
                <a href="{{ url_for('register') }}" class="btn btn-primary" style="padding: 8px 24px; font-size: 0.95rem;">Sign Up</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Your Ride, Your Choice</h1>
            <p class="hero-subtitle">Travel together, save money, and meet new people. The most trusted intercity peer-to-peer carpooling community.</p>
            <div class="hero-buttons">
                <a href="{{ url_for('login') }}" class="btn btn-primary">
                    <i class="fa-solid fa-satellite-dish"></i> Find a Ride
                </a>
                <a href="{{ url_for('login') }}" class="btn btn-outline">
                    <i class="fa-solid fa-car-side"></i> Offer a Ride
                </a>
            </div>
        </div>
    </header>

    <script>
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('tripShareUser');
            if (user) {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
