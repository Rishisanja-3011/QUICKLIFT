<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Booking - QuickLift Pro</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="{{ url_for('dashboard') }}" class="logo">
                <i class="fa-solid fa-route" style="color: var(--color-primary)"></i> Quick<span>Lift</span>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('find_ride') }}" class="nav-item">Find Ride</a>
                <a href="{{ url_for('publish') }}" class="nav-item">Publish Trip</a>
                <a href="/insights" class="nav-item">Insights</a>
                <a href="{{ url_for('logout') }}" class="btn btn-outline" style="padding: 6px 16px; font-size: 0.85rem; border-color: var(--color-error); color: var(--color-error);">Logout</a>
            </div>
        </div>
    </nav>

    <div class="app-container container" style="display: flex; justify-content: center; align-items: flex-start;">
        <div class="glass-panel" style="width: 100%; max-width: 500px; padding: 0; overflow: hidden;">
            <div style="background: rgba(15,23,42,0.9); padding: var(--space-xl); text-align: center; border-bottom: 1px solid var(--color-glass-border);">
                <i class="fa-solid fa-receipt fa-3x" style="color: var(--color-primary); margin-bottom: 15px;"></i>
                <h2 style="margin: 0;">Reservation Summary</h2>
            </div>
            
            <div style="padding: var(--space-xl);">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--color-glass-border); padding-bottom: 10px;">
                    <span style="color: var(--color-text-secondary); font-size: 0.9rem; font-weight: 600; text-transform: uppercase;">Leaving From</span>
                    <span style="color: #fff; font-weight: 700;">{{ ride['leaving_from'] }}</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--color-glass-border); padding-bottom: 10px;">
                    <span style="color: var(--color-text-secondary); font-size: 0.9rem; font-weight: 600; text-transform: uppercase;">Going To</span>
                    <span style="color: #fff; font-weight: 700;">{{ ride['going_to'] }}</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--color-glass-border); padding-bottom: 10px;">
                    <span style="color: var(--color-text-secondary); font-size: 0.9rem; font-weight: 600; text-transform: uppercase;">Vehicle</span>
                    <span style="color: #fff; font-weight: 700;">{{ ride['vehicle'] }}</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid var(--color-glass-border); padding-bottom: 10px;">
                    <span style="color: var(--color-text-secondary); font-size: 0.9rem; font-weight: 600; text-transform: uppercase;">Driver Username</span>
                    <span style="color: var(--color-primary); font-weight: 700;">@{{ ride['username'] }}</span>
                </div>

                <div style="background: rgba(0,242,254,0.1); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid rgba(0,242,254,0.2); margin-top: 30px;">
                    <span style="color: var(--color-primary); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Payable Amount</span>
                    <div style="font-size: 2.5rem; font-weight: 900; color: #fff;">₹{{ ride['price_per_seat'] }}</div>
                </div>

                <form action="{{ url_for('book_ride', ride_id=ride['id']) }}" method="GET" style="margin-top: 30px;">
                    <button type="submit" class="btn btn-primary btn-block" style="padding: 18px; font-size: 1.1rem;">
                        <i class="fa-solid fa-check"></i> Confirm Booking
                    </button>
                </form>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="/find-ride" style="color: var(--color-text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500;">
                        <i class="fa-solid fa-arrow-left"></i> Cancel Booking
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
