<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - QuickLift Pro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .split-left-reg {
             background: linear-gradient(135deg, rgba(79, 172, 254, 0.9), rgba(0, 242, 254, 0.4)), url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?q=80&w=2070&auto=format&fit=crop') center/cover;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 640px) {
            .form-grid { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="split-screen">
        <div class="split-left split-left-reg">
            <div class="split-left-content">
               <h1 style="color: #0f172a;">Join QuickLift</h1>
               <p style="color: rgba(15,23,42,0.8); font-size: 1.2rem; font-weight: 500;">
                  Create your account. Every member is verified to ensure maximum security across all rides.
               </p>
               <div style="margin-top: 40px; display:flex; gap: 20px;">
                    <i class="fa-solid fa-fingerprint" style="font-size: 3rem; color: #0f172a; opacity: 0.8;"></i>
                    <i class="fa-solid fa-id-card-clip" style="font-size: 3rem; color: #0f172a; opacity: 0.8;"></i>
               </div>
            </div>
        </div>
        
        <div class="split-right">
            <div class="auth-form-wrapper glass-panel" style="max-width: 600px; padding: 2rem;">
                <div style="text-align: center; margin-bottom: var(--space-lg);">
                    <h2>Create Account</h2>
                    <p>Enter your details to register.</p>
                </div>

                {% if error %}
                <div class="alert alert-error">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    {{ error }}
                </div>
                {% endif %}
                
                <form action="/register" method="post" enctype="multipart/form-data"> 
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="fullname" class="form-control" required>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Contact Number</label>
                            <input type="text" name="contact" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">City</label>
                            <input type="text" name="city" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-control" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" style="border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 15px; text-align: center; background: rgba(0,0,0,0.2);">
                        <label class="form-label" style="cursor:pointer; margin:0;">
                            <i class="fa-solid fa-upload"></i> <span id="fileNameDisplay">Upload Valid ID Scan</span>
                            <input type="file" name="file" id="fileInput" class="form-control" style="display: none;" required onchange="document.getElementById('fileNameDisplay').textContent = this.files[0] ? this.files[0].name : 'Upload Valid ID Scan'">
                        </label>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fa-solid fa-user-plus"></i> Register
                    </button>
                </form>

                <div style="margin-top: var(--space-lg); text-align: center; font-size: 0.95rem; color: var(--color-text-secondary);">
                    Already have an account? <a href="{{ url_for('login') }}" style="font-weight: 700;">Login Here</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
