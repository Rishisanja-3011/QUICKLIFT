<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - QuickLift Pro</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="split-screen" style="justify-content: center; align-items: center; background: url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?ixlib=rb-1.2.1') center/cover;">
        <div class="split-right" style="background: transparent;">
            <div class="auth-form-wrapper glass-panel">
                <a href="{{ url_for('index') }}" class="logo" style="margin-bottom: var(--space-xl); justify-content: center;">
                    <i class="fa-solid fa-key" style="color: var(--color-primary)"></i> Quick<span>Lift</span>
                </a>
                
                <div style="text-align: center; margin-bottom: var(--space-lg);">
                    <h2>Reset Password</h2>
                    <p>Enter your new password.</p>
                </div>

                {% if error %}
                <div class="alert alert-error">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    {{ error }}
                </div>
                {% endif %}
                
                <form action="/reset-password" method="post"> 
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fa-solid fa-arrows-rotate"></i> Reset Password
                    </button>
                    
                </form>
            </div>
        </div>
    </div>
</body>
</html>
